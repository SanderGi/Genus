<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genus Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>
    <main class="app-shell">
        <section class="calculator-stage">
            <section class="input-panel">
                <div class="panel-header">
                    <p class="eyebrow">PAGE</p>
                    <h1>Graph Genus Calculator</h1>
                    <p class="lede">Enter an adjacency list, choose an algorithm, and compute text, JSON, drawing, or 3D output.</p>
                </div>

                <div class="control-grid">
                    <label class="field">
                        <span>Algorithm</span>
                        <select id="algorithm">
                            <option value="page">PAGE</option>
                            <option value="page_sc">PAGE Simple-Cycle-Upperbound</option>
                            <option value="multi_genus">MULTI_GENUS</option>
                            <option value="none">None</option>
                        </select>
                    </label>
                    <label class="field">
                        <span>Output format</span>
                        <select id="output_format">
                            <option value="text">Text</option>
                            <option value="json">JSON</option>
                            <option value="drawing">Drawing</option>
                            <option value="3d">3D</option>
                        </select>
                    </label>
                </div>

                <div class="example-row">
                    <label class="field example-field">
                        <span>Example graph</span>
                        <select id="example_adj"></select>
                    </label>
                    <button id="load_example" class="secondary-action" type="button">Load</button>
                </div>

                <label class="field adjacency-field">
                    <span>Adjacency list</span>
                    <textarea id="adjlist" spellcheck="false" placeholder="0 1 2&#10;0 1 2&#10;0 1 2"></textarea>
                </label>

                <div class="input-footer">
                    <p class="hint">One vertex per line. Use space-separated vertex numbers for each vertex's neighbors.</p>
                    <button id="calculate" class="primary-action" type="button">Calculate Genus</button>
                </div>
            </section>

            <section class="result-panel">
                <div class="result-card output-card">
                    <div class="card-title">
                        <h2>Output</h2>
                    </div>
                    <div id="stdout" class="output-box empty-state">Results will appear here.</div>
                </div>
                <div class="result-card">
                    <div class="card-title">
                        <h2>Status</h2>
                    </div>
                    <div id="stderr" class="log-box empty-state">Idle.</div>
                </div>
                <div class="result-card">
                    <div class="card-title">
                        <h2>Runtime</h2>
                    </div>
                    <div id="runtime" class="runtime-box empty-state">Not run yet.</div>
                </div>
            </section>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "/vendor/three.js"
            }
        }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
